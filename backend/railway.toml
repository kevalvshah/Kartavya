[deploy]
startCommand = "gunicorn server:app -k uvicorn.workers.UvicornWorker --workers 4 --threads 2 --worker-connections 1000 --backlog 2048 --timeout 120 --keep-alive 5 --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

[deploy.healthcheck]
path = "/api/health"
intervalSeconds = 30
timeoutSeconds = 10
