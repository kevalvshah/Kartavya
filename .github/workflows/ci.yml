name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: import smoke + unit tests ──────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime deps
        run: pip install -r requirements.txt

      - name: Install dev/test deps
        run: pip install -r requirements-dev.txt

      - name: Import smoke test
        run: python -c "import auth_router, invite_router, approvals_router, limiter"
        env:
          JWT_SECRET: ci-test-secret-minimum-32-chars-long
          REPORT_DISPATCH_SECRET: ci-test-dispatch-secret-minimum-32-chars

      - name: Run unit tests
        run: pytest --cov=. --cov-report=term-missing --cov-report=xml -q
        env:
          JWT_SECRET: ci-test-secret-minimum-32-chars-long
          REPORT_DISPATCH_SECRET: ci-test-dispatch-secret-minimum-32-chars
          # DATABASE_URL is intentionally absent — db._pool is mocked in tests

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ── Frontend: TypeScript check + Vitest unit tests ──────────────────────────
  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck
        continue-on-error: true  # JSX project has no tsconfig yet; best-effort

      - name: Run Vitest unit tests
        run: yarn test

  # ── Mobile: TypeScript check ─────────────────────────────────────────────────
  mobile-types:
    name: Mobile TypeScript check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit

  # ── E2E: Playwright (deployed app, optional) ─────────────────────────────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    # Only run E2E in CI when the deployed URL is provided as a secret
    if: vars.PLAYWRIGHT_BASE_URL != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm install -g playwright
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
